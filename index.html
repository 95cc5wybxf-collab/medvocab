<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedVocab — 医学部受験英単語</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ffd166">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedVocab">
<link rel="apple-touch-icon" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c10;
  --s1: #13131a;
  --s2: #1a1a24;
  --s3: #22222e;
  --border: rgba(255,255,255,0.07);
  --text: #ede8ff;
  --text2: #7a7a9a;
  --text3: #4a4a6a;

/* Level colors */
–l1: #ffd166; /* 超頻出 */
–l2: #06d6a0; /* 頻出 */
–l3: #4cc9f0; /* 標準 */
–l4: #7c6fcd; /* やや難 */
–l5: #f72585; /* 難 */
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Noto Sans JP’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
}

/* Noise texture overlay */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 999;
opacity: 0.4;
}

.wrap {
max-width: 660px;
margin: 0 auto;
padding: 0 16px 80px;
}

/* ── Header ── */
.header {
padding: 36px 0 24px;
display: flex;
align-items: flex-end;
justify-content: space-between;
}

.logo-block {}
.logo {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-weight: 700;
letter-spacing: -0.03em;
color: var(–text);
}
.logo em {
font-style: italic;
font-weight: 400;
color: var(–l1);
}
.sub {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.65rem;
color: var(–text3);
letter-spacing: 0.15em;
text-transform: uppercase;
margin-top: 3px;
}

.score-pill {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.75rem;
color: var(–text2);
background: var(–s2);
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 14px;
display: flex;
gap: 10px;
}
.score-pill span { color: var(–l1); }

/* ── Level tabs ── */
.level-tabs {
display: flex;
gap: 6px;
margin-bottom: 20px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}
.level-tabs::-webkit-scrollbar { display: none; }

.ltab {
flex-shrink: 0;
background: var(–s1);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
min-width: 90px;
}
.ltab:hover { border-color: rgba(255,255,255,0.15); }
.ltab.active { background: var(–s2); }
.ltab-dot {
width: 8px; height: 8px;
border-radius: 50%;
margin: 0 auto 6px;
}
.ltab-name {
font-size: 0.7rem;
font-weight: 700;
color: var(–text);
}
.ltab-num {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.62rem;
color: var(–text2);
margin-top: 2px;
}
.ltab-bar {
height: 2px;
border-radius: 1px;
margin-top: 6px;
background: var(–border);
overflow: hidden;
}
.ltab-bar-fill {
height: 100%;
border-radius: 1px;
transition: width 0.4s;
}

/* ── Mode row ── */
.mode-row {
display: flex;
gap: 6px;
margin-bottom: 20px;
}
.mbtn {
flex: 1;
background: var(–s1);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 6px;
cursor: pointer;
font-size: 0.75rem;
font-family: ‘Noto Sans JP’, sans-serif;
color: var(–text2);
transition: all 0.2s;
text-align: center;
}
.mbtn.active {
color: var(–text);
border-color: rgba(255,255,255,0.18);
background: var(–s2);
}
.mbtn-icon { font-size: 1rem; display: block; margin-bottom: 2px; }

/* ── Progress bar ── */
.prog-wrap {
height: 2px;
background: var(–s3);
border-radius: 1px;
margin-bottom: 18px;
overflow: hidden;
}
.prog-fill {
height: 100%;
border-radius: 1px;
transition: width 0.4s;
}

/* ── Flashcard ── */
.card-shell {
background: var(–s1);
border: 1px solid var(–border);
border-radius: 18px;
padding: 44px 28px 36px;
min-height: 230px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
cursor: pointer;
transition: border-color 0.25s, box-shadow 0.25s;
position: relative;
margin-bottom: 12px;
overflow: hidden;
}
.card-shell::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at 50% 0%, rgba(255,209,102,0.04) 0%, transparent 65%);
pointer-events: none;
}
.card-shell:hover { border-color: rgba(255,255,255,0.12); }
.card-shell.revealed {
border-color: rgba(6,214,160,0.3);
box-shadow: 0 0 28px rgba(6,214,160,0.07);
}

.card-level-badge {
position: absolute;
top: 16px;
right: 16px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.6rem;
letter-spacing: 0.1em;
padding: 3px 8px;
border-radius: 4px;
background: var(–s3);
border: 1px solid var(–border);
}

.card-num {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.65rem;
color: var(–text3);
margin-bottom: 14px;
letter-spacing: 0.1em;
}

.card-en {
font-family: ‘Playfair Display’, serif;
font-size: 2.8rem;
font-weight: 700;
letter-spacing: -0.03em;
line-height: 1;
margin-bottom: 8px;
color: var(–text);
}

.card-ipa {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.8rem;
color: var(–text2);
margin-bottom: 18px;
}

.tap-hint {
font-size: 0.72rem;
color: var(–text3);
letter-spacing: 0.05em;
}

.reveal-area {
display: none;
animation: up 0.25s ease;
}
.reveal-area.show { display: block; }

@keyframes up {
from { opacity:0; transform: translateY(10px); }
to   { opacity:1; transform: translateY(0); }
}

.card-divider {
width: 32px; height: 1px;
background: var(–border);
margin: 14px auto;
}

.card-jp {
font-size: 1.7rem;
font-weight: 700;
margin-bottom: 8px;
}

.card-desc {
font-size: 0.8rem;
color: var(–text2);
line-height: 1.65;
max-width: 380px;
}

.card-example {
margin-top: 10px;
font-size: 0.72rem;
color: var(–text3);
font-style: italic;
line-height: 1.5;
}

/* ── Answer buttons ── */
.ans-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 12px;
}
.ans-btn {
padding: 13px;
border-radius: 10px;
border: 1px solid var(–border);
cursor: pointer;
font-size: 0.82rem;
font-family: ‘Noto Sans JP’, sans-serif;
font-weight: 500;
transition: all 0.18s;
display: flex;
align-items: center;
justify-content: center;
gap: 5px;
}
.ans-ng { background: rgba(247,37,133,0.07); color: #f87171; border-color: rgba(247,37,133,0.18); }
.ans-ng:hover { background: rgba(247,37,133,0.14); }
.ans-ok { background: rgba(6,214,160,0.07); color: #34d399; border-color: rgba(6,214,160,0.2); }
.ans-ok:hover { background: rgba(6,214,160,0.14); }

/* ── Nav ── */
.nav-row {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 24px;
}
.nav-btn {
background: var(–s2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 18px;
cursor: pointer;
color: var(–text2);
font-size: 0.82rem;
font-family: ‘Noto Sans JP’, sans-serif;
transition: all 0.18s;
}
.nav-btn:hover { color: var(–text); border-color: rgba(255,255,255,0.14); }
.nav-count {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.78rem;
color: var(–text2);
padding: 0 8px;
}

/* ── Quiz ── */
.quiz-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 12px;
}
.qopt {
background: var(–s1);
border: 1px solid var(–border);
border-radius: 10px;
padding: 16px 10px;
cursor: pointer;
font-size: 0.85rem;
font-family: ‘Noto Sans JP’, sans-serif;
color: var(–text);
text-align: center;
line-height: 1.4;
transition: all 0.18s;
}
.qopt:hover:not(.dis) { border-color: rgba(255,255,255,0.18); }
.qopt.ok { border-color: rgba(6,214,160,0.5); background: rgba(6,214,160,0.08); color: #34d399; }
.qopt.ng { border-color: rgba(247,37,133,0.4); background: rgba(247,37,133,0.06); color: #f87171; }
.qopt.dis { cursor: default; }

/* ── Sticker list ── */
.sticker-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.sticker-item {
background: var(–s1);
border: 1px solid var(–border);
border-radius: 10px;
padding: 13px 16px;
display: flex;
justify-content: space-between;
align-items: center;
}
.si-left {}
.si-en { font-family: ‘Playfair Display’, serif; font-size: 1.1rem; }
.si-jp { font-size: 0.78rem; color: var(–text2); margin-top: 2px; }
.si-badge {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.6rem;
padding: 3px 8px;
border-radius: 5px;
background: rgba(247,37,133,0.1);
color: #f87171;
border: 1px solid rgba(247,37,133,0.2);
}

.empty-msg {
text-align: center;
color: var(–text3);
padding: 48px 0;
font-size: 0.88rem;
}

.hidden { display: none !important; }
</style>

</head>
<body>
<div class="wrap">

  <!-- Header -->

  <div class="header">
    <div class="logo-block">
      <div class="logo">Med<em>Vocab</em></div>
      <div class="sub">医学部受験 · 頻出英単語 150</div>
    </div>
    <div class="score-pill">
      正解 <span id="h-correct">0</span> / <span id="h-total">0</span>
    </div>
  </div>

  <!-- Level tabs -->

  <div class="level-tabs" id="level-tabs"></div>

  <!-- Mode row -->

  <div class="mode-row">
    <button class="mbtn active" id="mb-flash" onclick="setMode('flash')"><span class="mbtn-icon">🃏</span>フラッシュ</button>
    <button class="mbtn" id="mb-quiz" onclick="setMode('quiz')"><span class="mbtn-icon">🧠</span>クイズ</button>
    <button class="mbtn" id="mb-sticker" onclick="setMode('sticker')"><span class="mbtn-icon">⚠️</span>苦手</button>
  </div>

  <!-- Progress -->

  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- Flash mode -->

  <div id="mode-flash">
    <div class="card-shell" id="fcard" onclick="reveal()">
      <div class="card-level-badge" id="f-badge">LEVEL 1</div>
      <div class="card-num" id="f-num">01 / 30</div>
      <div class="card-en" id="f-en">—</div>
      <div class="card-ipa" id="f-ipa"></div>
      <div class="tap-hint" id="f-hint">タップして意味を確認 →</div>
      <div class="reveal-area" id="f-reveal">
        <div class="card-divider"></div>
        <div class="card-jp" id="f-jp"></div>
        <div class="card-desc" id="f-desc"></div>
        <div class="card-example" id="f-ex"></div>
      </div>
    </div>
    <div class="ans-row" id="ans-row" style="display:none">
      <button class="ans-btn ans-ng" onclick="mark(false)">✗ 苦手に追加</button>
      <button class="ans-btn ans-ok" onclick="mark(true)">✓ 覚えた！</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="go(-1)">← 前</button>
      <span class="nav-count" id="f-counter">1 / 30</span>
      <button class="nav-btn" onclick="go(1)">次 →</button>
    </div>
  </div>

  <!-- Quiz mode -->

  <div id="mode-quiz" class="hidden">
    <div class="card-shell" style="cursor:default">
      <div class="card-level-badge" id="q-badge">LEVEL 1</div>
      <div class="card-num" id="q-num">01 / 30</div>
      <div class="card-en" id="q-en">—</div>
      <div class="card-ipa" id="q-ipa"></div>
    </div>
    <div class="quiz-grid" id="quiz-grid"></div>
    <div class="nav-row"><span class="nav-count" id="q-counter">1 / 30</span></div>
  </div>

  <!-- Sticker mode -->

  <div id="mode-sticker" class="hidden">
    <div class="sticker-list" id="sticker-list"></div>
  </div>

</div>

<script>
// ════════════════════════════════════════
//  VOCABULARY DATA  —  150語 / 5レベル
// ════════════════════════════════════════
const LEVELS = [
  {
    id: 1,
    name: '超頻出',
    color: '#ffd166',
    desc: '最頻出・確実に覚える',
    words: [
      { en:'cell',          ipa:'/sɛl/',              jp:'細胞',       desc:'生命の基本単位。すべての生物はひとつ以上の細胞からなる。', ex:'Red blood cells carry oxygen throughout the body.' },
      { en:'protein',       ipa:'/ˈproʊtiːn/',        jp:'タンパク質', desc:'アミノ酸が連なった高分子。酵素・抗体・構造材料として機能。', ex:'Enzymes are proteins that catalyze biochemical reactions.' },
      { en:'enzyme',        ipa:'/ˈɛnzaɪm/',          jp:'酵素',       desc:'化学反応を触媒する生体タンパク質。反応後も変化しない。', ex:'Digestive enzymes break down food into smaller molecules.' },
      { en:'gene',          ipa:'/dʒiːn/',             jp:'遺伝子',     desc:'DNAの特定配列で、形質を決定する遺伝の単位。', ex:'A single gene may influence multiple physical traits.' },
      { en:'DNA',           ipa:'/ˌdiːɛnˈeɪ/',        jp:'DNA',        desc:'デオキシリボ核酸。遺伝情報を担う二重らせん状高分子。', ex:'DNA replication occurs before cell division.' },
      { en:'membrane',      ipa:'/ˈmɛmbreɪn/',        jp:'膜',         desc:'細胞を囲む脂質二重層。選択的透過性をもつ。', ex:'The plasma membrane regulates what enters and exits the cell.' },
      { en:'nucleus',       ipa:'/ˈnjuːkliəs/',       jp:'核',         desc:'DNA・RNA合成の中心。二重膜に包まれた細胞小器官。', ex:'The nucleus controls cellular activities.' },
      { en:'metabolism',    ipa:'/məˈtæbəlɪzəm/',     jp:'代謝',       desc:'生体内で起こる化学変化の総体。同化と異化からなる。', ex:'Metabolic disorders can affect energy production.' },
      { en:'organism',      ipa:'/ˈɔːrɡənɪzəm/',      jp:'生物・有機体',desc:'生命を維持する構造的・機能的単位としての生き物。', ex:'Bacteria are single-celled organisms.' },
      { en:'tissue',        ipa:'/ˈtɪʃuː/',            jp:'組織',       desc:'類似した細胞の集合体。上皮・結合・筋・神経の4種が基本。', ex:'Muscle tissue contracts to produce movement.' },
      { en:'oxygen',        ipa:'/ˈɒksɪdʒən/',        jp:'酸素',       desc:'好気性生物のエネルギー産生に不可欠な元素 (O₂)。', ex:'Hemoglobin carries oxygen in the blood.' },
      { en:'glucose',       ipa:'/ˈɡluːkoʊs/',        jp:'グルコース', desc:'最も重要な単糖。細胞のエネルギー源として中心的役割。', ex:'Insulin regulates blood glucose levels.' },
      { en:'hormone',       ipa:'/ˈhɔːrmoʊn/',        jp:'ホルモン',   desc:'内分泌腺から分泌される化学的情報伝達物質。', ex:'Insulin is a hormone produced by the pancreas.' },
      { en:'nerve',         ipa:'/nɜːrv/',             jp:'神経',       desc:'電気信号を伝えるニューロンの束。末梢神経系を構成。', ex:'The optic nerve transmits visual signals to the brain.' },
      { en:'blood',         ipa:'/blʌd/',              jp:'血液',       desc:'酸素・栄養・免疫細胞などを全身に輸送する液状組織。', ex:'Blood pressure measures the force of blood on arterial walls.' },
      { en:'immune',        ipa:'/ɪˈmjuːn/',           jp:'免疫の',     desc:'病原体から体を守る防御機構に関連する形容詞。', ex:'The immune system defends against infections.' },
      { en:'antibody',      ipa:'/ˈæntɪbɒdi/',        jp:'抗体',       desc:'B細胞が産生する免疫グロブリン。抗原を特異的に認識。', ex:'Vaccines stimulate antibody production.' },
      { en:'mutation',      ipa:'/mjuːˈteɪʃən/',      jp:'突然変異',   desc:'DNA塩基配列の変化。がんや遺伝性疾患の原因となり得る。', ex:'Some mutations are caused by radiation exposure.' },
      { en:'chromosome',    ipa:'/ˈkroʊməsoʊm/',      jp:'染色体',     desc:'DNAとタンパク質からなる構造体。ヒトは46本保有。', ex:'Down syndrome is caused by an extra chromosome 21.' },
      { en:'ATP',           ipa:'/ˌeɪtiːˈpiː/',       jp:'ATP',        desc:'アデノシン三リン酸。細胞のエネルギー通貨として機能。', ex:'ATP is produced during cellular respiration.' },
      { en:'osmosis',       ipa:'/ɒzˈmoʊsɪs/',        jp:'浸透',       desc:'半透膜を通じた水の高濃度から低濃度への移動。', ex:'Osmosis maintains water balance in plant cells.' },
      { en:'photosynthesis',ipa:'/ˌfoʊtəˈsɪnθəsɪs/', jp:'光合成',     desc:'光エネルギーを使ってCO₂と水から有機物を合成する過程。', ex:'Photosynthesis produces oxygen as a byproduct.' },
      { en:'respiration',   ipa:'/ˌrɛspəˈreɪʃən/',   jp:'呼吸',       desc:'細胞内でグルコースを分解してATPを産生する過程。', ex:'Aerobic respiration requires oxygen.' },
      { en:'acid',          ipa:'/ˈæsɪd/',             jp:'酸',         desc:'水溶液中でH⁺を放出する物質。pH7未満を示す。', ex:'Stomach acid (HCl) helps digest food.' },
      { en:'base',          ipa:'/beɪs/',               jp:'塩基',       desc:'水溶液中でOH⁻を放出またはH⁺を受け取る物質。', ex:'Bases neutralize acids in chemical reactions.' },
      { en:'nucleus',       ipa:'/ˈnjuːkliəs/',       jp:'核',         desc:'細胞の制御中心。DNAを含む二重膜で覆われた小器官。', ex:'mRNA is transcribed from DNA in the nucleus.' },
      { en:'receptor',      ipa:'/rɪˈsɛptər/',        jp:'受容体',     desc:'特定の化学物質と結合して細胞内に信号を伝えるタンパク質。', ex:'Hormone receptors are often found on cell membranes.' },
      { en:'synapse',       ipa:'/ˈsɪnæps/',          jp:'シナプス',   desc:'ニューロン間の接合部。神経伝達物質を介して信号を伝える。', ex:'Neurotransmitters cross the synapse between neurons.' },
      { en:'diffusion',     ipa:'/dɪˈfjuːʒən/',       jp:'拡散',       desc:'物質が高濃度から低濃度へ自発的に移動する現象。', ex:'Gases exchange by diffusion across the lung membrane.' },
      { en:'evolution',     ipa:'/ˌiːvəˈluːʃən/',    jp:'進化',       desc:'世代を経て生物集団の遺伝的特性が変化するプロセス。', ex:'Darwin proposed evolution by natural selection.' },
    ]
  },
  {
    id: 2,
    name: '頻出',
    color: '#06d6a0',
    desc: '入試頻出・得点源',
    words: [
      { en:'mitosis',       ipa:'/maɪˈtoʊsɪs/',       jp:'有糸分裂',   desc:'体細胞分裂。遺伝的に同一な2つの娘細胞を生じる。', ex:'Mitosis occurs in somatic cells for growth and repair.' },

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let curLevel = 0;
let curIdx   = 0;
let mode     = 'flash';
let revealed = false;
let quizDone = false;
let stats    = { total: 0, correct: 0 };
let stickers = [];

try { stickers = JSON.parse(localStorage.getItem('mv2_stickers') || '[]'); } catch(e){}

function saveStickers(){ try{ localStorage.setItem('mv2_stickers', JSON.stringify(stickers)); }catch(e){} }

function words(){ return LEVELS[curLevel].words; }
function lv(){ return LEVELS[curLevel]; }

// ════════════════════════════════════════
//  BUILD LEVEL TABS
// ════════════════════════════════════════
function buildTabs(){
  const c = document.getElementById('level-tabs');
  c.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const done = stickers.filter(s => s._level === i).length;
    const pct  = Math.max(0, Math.round((1 - done / lv.words.length) * 100));
    const t = document.createElement('div');
    t.className = 'ltab' + (i === curLevel ? ' active' : '');
    t.style.borderColor = i === curLevel ? lv.color + '44' : '';
    t.innerHTML = `
      <div class="ltab-dot" style="background:${lv.color}"></div>
      <div class="ltab-name" style="color:${i===curLevel?lv.color:''}">Lv.${lv.id} ${lv.name}</div>
      <div class="ltab-num">${lv.words.length}語</div>
      <div class="ltab-bar"><div class="ltab-bar-fill" style="width:${pct}%;background:${lv.color}"></div></div>
    `;
    t.onclick = () => { curLevel = i; curIdx = 0; revealed = false; quizDone = false; buildTabs(); render(); };
    c.appendChild(t);
  });
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render(){
  updateHeader();
  updateProg();
  if (mode === 'flash')   renderFlash();
  else if(mode === 'quiz') renderQuiz();
  else                     renderSticker();
}

function updateHeader(){
  document.getElementById('h-correct').textContent = stats.correct;
  document.getElementById('h-total').textContent   = stats.total;
}

function updateProg(){
  const pct = ((curIdx + 1) / words().length * 100).toFixed(1);
  const fill = document.getElementById('prog-fill');
  fill.style.width = pct + '%';
  fill.style.background = lv().color;
}

// ─ Flash ─
function renderFlash(){
  const w = words()[curIdx];
  revealed = false;
  const card = document.getElementById('fcard');
  card.classList.remove('revealed');
  document.getElementById('f-badge').textContent = `LEVEL ${lv().id} · ${lv().name}`;
  document.getElementById('f-badge').style.color = lv().color;
  document.getElementById('f-num').textContent   = `${String(curIdx+1).padStart(2,'0')} / ${words().length}`;
  document.getElementById('f-en').textContent    = w.en;
  document.getElementById('f-ipa').textContent   = w.ipa;
  document.getElementById('f-hint').style.display = '';
  document.getElementById('f-jp').textContent    = w.jp;
  document.getElementById('f-jp').style.color    = lv().color;
  document.getElementById('f-desc').textContent  = w.desc;
  document.getElementById('f-ex').textContent    = w.ex ? `e.g. "${w.ex}"` : '';
  document.getElementById('f-reveal').classList.remove('show');
  document.getElementById('ans-row').style.display = 'none';
  document.getElementById('f-counter').textContent = `${curIdx+1} / ${words().length}`;
}

function reveal(){
  if(revealed) return;
  revealed = true;
  document.getElementById('fcard').classList.add('revealed');
  document.getElementById('f-hint').style.display = 'none';
  document.getElementById('f-reveal').classList.add('show');
  document.getElementById('ans-row').style.display = 'grid';
  stats.total++;
  updateHeader();
}

function mark(ok){
  const w = words()[curIdx];
  if(ok){
    stats.correct++;
    stickers = stickers.filter(s => !(s.en === w.en && s._level === curLevel));
  } else {
    if(!stickers.find(s => s.en === w.en && s._level === curLevel)){
      stickers.push({...w, _level: curLevel, _lname: lv().name, _lcolor: lv().color});
    }
  }
  saveStickers();
  updateHeader();
  buildTabs();
  go(1);
}

function go(dir){
  curIdx = (curIdx + dir + words().length) % words().length;
  revealed = false; quizDone = false;
  render();
}

// ─ Quiz ─
function renderQuiz(){
  const w = words()[curIdx];
  quizDone = false;
  document.getElementById('q-badge').textContent = `LEVEL ${lv().id} · ${lv().name}`;
  document.getElementById('q-badge').style.color = lv().color;
  document.getElementById('q-num').textContent   = `${String(curIdx+1).padStart(2,'0')} / ${words().length}`;
  document.getElementById('q-en').textContent    = w.en;
  document.getElementById('q-ipa').textContent   = w.ipa;
  document.getElementById('q-counter').textContent = `${curIdx+1} / ${words().length}`;

  const all = LEVELS.flatMap(l => l.words);
  const wrong = all.filter(x => x.en !== w.en).sort(()=>Math.random()-.5).slice(0,3);
  const opts  = [...wrong, w].sort(()=>Math.random()-.5);

  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'qopt';
    btn.textContent = o.jp;
    btn.onclick = () => {
      if(quizDone) return;
      quizDone = true;
      stats.total++;
      const correct = o.en === w.en;
      btn.classList.add(correct ? 'ok' : 'ng');
      if(correct){
        stats.correct++;
        stickers = stickers.filter(s => !(s.en === w.en && s._level === curLevel));
      } else {
        grid.querySelectorAll('.qopt').forEach(b => { if(b.textContent === w.jp) b.classList.add('ok'); });
        if(!stickers.find(s => s.en === w.en && s._level === curLevel)){
          stickers.push({...w, _level: curLevel, _lname: lv().name, _lcolor: lv().color});
        }
      }
      grid.querySelectorAll('.qopt').forEach(b => b.classList.add('dis'));
      saveStickers();
      updateHeader();
      buildTabs();
      setTimeout(() => go(1), 1100);
    };
    grid.appendChild(btn);
  });
  updateProg();
}

// ─ Sticker ─
function renderSticker(){
  const list = document.getElementById('sticker-list');
  if(!stickers.length){
    list.innerHTML = '<div class="empty-msg">苦手単語はまだありません 🎉<br><br>フラッシュカードで「✗ 苦手に追加」を押すと<br>ここに表示されます</div>';
    return;
  }
  list.innerHTML = '';
  stickers.forEach(w => {
    const d = document.createElement('div');
    d.className = 'sticker-item';
    d.innerHTML = `
      <div class="si-left">
        <div class="si-en">${w.en}</div>
        <div class="si-jp">${w.jp} · ${w.ipa}</div>
      </div>
      <div class="si-badge" style="color:${w._lcolor||'#f87171'};border-color:${w._lcolor||'#f87171'}44">Lv.${(w._level||0)+1} ${w._lname||''}</div>
    `;
    list.appendChild(d);
  });
}

// ════════════════════════════════════════
//  MODE SWITCH
// ════════════════════════════════════════
function setMode(m){
  mode = m;
  curIdx = 0; revealed = false; quizDone = false;
  ['flash','quiz','sticker'].forEach(x => {
    document.getElementById('mode-'+x).classList.toggle('hidden', x !== m);
    document.getElementById('mb-'+x).classList.toggle('active', x === m);
  });
  render();
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
buildTabs();
render();

// ── Service Worker登録 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}

// ── インストールバナー ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'none';
  });
}
</script>
